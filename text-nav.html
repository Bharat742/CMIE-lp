    <style>
        body {
  background: #f3f3f3;
  font-family: "Poppins", sans-serif !important;
}

/* ══════════════════════════════
     TOP HEADER
  ══════════════════════════════ */
.top-header {
  background: #fff;
  border-bottom: 2px solid #e0e0e0;
  padding: 10px 0px;
  font-family: "Poppins", sans-serif;
}

.logo-section {
  display: flex;
  align-items: center;
  gap: 12px;
}

.logo-section img {
  height: 54px;
  object-fit: contain;
}
.top_nav{background: #F2F2F2;}
.top_nav p{color: #17469E;
    font-size: 10px;font-weight: 500;
    text-align: center;
    padding: 4px;margin-bottom: 0;}
.logo-section .menu{display: none;}
.navbar{background: linear-gradient(90deg, #27A8E0 0%, #2D3691 100%);padding: 0 !important;}
.navbar .nav-link{padding: 10px 16px !important;
    font-size: 12px;
    letter-spacing: 0.2px;
    font-weight: 300;
    color: #fff;
    cursor: pointer;
    white-space: nowrap;
    transition: background 0.15s, color 0.15s;
    text-decoration: none;
    display: flex;
    align-items: center;
}
.navbar .nav-link.active, .navbar .nav-link:hover{background: #f0f4ff; color: #1a56db !important;}
.navbar .navbar-nav{height: -webkit-fill-available;}
.navbar .navbar-nav li{height: 100%; display: flex;}
.navbar-toggler {
    padding: 0px !important;
    font-size: 17.5px !important;
    line-height: 0 !important;
    color: rgba(0, 0, 0, 0.65) !important;
    background-color: transparent !important;
    border: 0px solid rgba(0, 0, 0, 0.15) !important;
    border-radius: 5.25px !important;
    transition: box-shadow 0.15s ease-in-out !important
}
.navbar-toggler-icon{display: inline-block !important;
    width: 1.5em !important;
    height: 1.5em !important;
    vertical-align: middle !important;
    background: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 30 30'%3e%3cpath stroke='rgba%2833, 37, 41, 0.75%29' stroke-linecap='round' stroke-miterlimit='10' stroke-width='2' d='M4 7h22M4 15h22M4 23h22'/%3e%3c/svg%3e");
    background-repeat: no-repeat !important;
    background-position: center !important;
    background-size: 100% !important;}
.logo-divider {
  width: 1px;
  height: 34px;
  background: #ccc;
  flex-shrink: 0;
}

.search-wrap {
  position: relative;
  width: 355px;
}

.search-wrap input {
  border: 1.5px solid #ddd;
  border-radius: 20px;
  padding: 7px 38px 7px 14px;
  font-size: 9px;
  width: 100%;
  outline: none;
  color: #D9D9D9;
}
.logo_search_flex{display: flex;align-items: center;gap: 80px;}

.search-wrap button {
  position: absolute;
  right: 10px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  cursor: pointer;
  display: flex;
  align-items: center;
}

.search-wrap button img {
  width: 15px;
  height: 15px;
  opacity: 0.5;
}

.location-btn {
  font-size: 11px;
    color: #7C7C7C;
    font-weight: 400;padding-right: 15px;
  display: flex;
  align-items: center;
  gap: 5px;
  cursor: pointer;
  white-space: nowrap;
}

.location-btn img {
  width: 13px;
  height: auto;
}

.my-account {
  font-size: 12px;
  font-weight: 400;
  color: #000;
  display: flex;
  align-items: center;
  gap: 6px;
  cursor: pointer;
  white-space: nowrap;text-decoration: none;
}

.my-account img {
  width: 10px;
    height: auto;
    margin-left: 10px;
}

/* ══════════════════════════════
     MAIN NAV
  ══════════════════════════════ */
.main-nav {
  background: linear-gradient(90deg, #27a8e0 0%, #2d3691 100%);
  color: #fff;
  position: relative;
  font-family: "Poppins", sans-serif;
}

.nav-inner {
  display: flex;
  align-items: stretch;
  overflow-x: auto;
  scrollbar-width: none;
}

.nav-inner::-webkit-scrollbar {
  display: none;
}

.nav-link-item {
  padding: 10px 16px;
  font-size: 12px;
  letter-spacing: 0.2px;
  font-weight: 300;
  color: #fff;
  cursor: pointer;
  white-space: nowrap;
  transition:
    background 0.15s,
    color 0.15s;
  /* border-right: 1px solid #f0f0f0; */
  text-decoration: none;
  display: flex;
  align-items: center;
  flex-shrink: 0;
}

.nav-link-item:hover {
  background: #f0f4ff;
  color: #1a56db;
}

.nav-cart {
  background: #0092d8;
  color: #fff !important;
  display: flex;
  align-items: center;
  gap: 7px;
  padding: 13px 30px;
  letter-spacing: 0.3px;
  font-weight: 300;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
  white-space: nowrap;
  line-height: 10px;
}

.nav-cart img {
  width: 18px;
  height: auto;
}

.cart-badge {
  background: #ff5722;
  color: #fff;
  border-radius: 50%;
  width: 18px;
  height: 18px;
  font-size: 10px;
  font-weight: 800;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.nav-wishlist {
  color: #fff;
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 13px 16px;
  font-weight: 300;
  font-size: 12px;
  cursor: pointer;
  flex-shrink: 0;
  letter-spacing: 0.3px;
  white-space: nowrap;
}

.nav-wishlist img {
  width: 15px;
  height: auto;
  margin-left: 6px;
}

    </style>
