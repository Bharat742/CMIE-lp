<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carrier AC Video Banner</title>
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Styling for the Video Section */
        .hero-video-section {
            position: relative;
            width: 100%;
            /* Adjust max-width as needed for your specific layout */
            max-width: 1200px; 
            margin: 0 auto;
            border-radius: 10px; /* Optional: smooth corners */
            overflow: hidden;
            background-color: #000; /* Dark background before video loads */
        }

        .hero-video-section video {
            width: 100%;
            height: auto;
            display: block;
            object-fit: cover;
            cursor: pointer;
        }

        /* Play Button Overlay Styling */
        .custom-play-btn {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background-color: #ffffff;
            color: #2b3a6b; /* Dark blue matching the Carrier theme */
            width: 80px;
            height: 80px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.3);
            cursor: pointer;
            z-index: 10;
            transition: all 0.3s ease-in-out;
        }

        /* Hover effect for the play button */
        .custom-play-btn:hover {
            transform: translate(-50%, -50%) scale(1.1);
            background-color: #f8f9fa;
        }

        /* Hide the custom button when the video is playing */
        .hero-video-section.is-playing .custom-play-btn {
            display: none;
        }
    </style>
</head>
<body>

    <section class="container-fluid py-5 bg-light">
        <div class="row justify-content-center">
            <div class="col-12 text-center">
                
                <div class="hero-video-section shadow-lg" id="videoContainer">
                    
                    <video id="promoVideo" poster="your-preview-image.png">
                        <source src="your-video-file.mp4" type="video/mp4">
                        Your browser does not support the video tag.
                    </video>

                    <div class="custom-play-btn" id="playBtn">
                        <i class="fas fa-play" style="margin-left: 6px;"></i>
                    </div>

                </div>

            </div>
        </div>
    </section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const videoContainer = document.getElementById('videoContainer');
            const video = document.getElementById('promoVideo');
            const playBtn = document.getElementById('playBtn');

            // Function to handle playing the video
            function playVideo() {
                if (video.paused) {
                    video.play();
                    video.setAttribute('controls', 'controls'); // Enable native controls (volume, fullscreen)
                    videoContainer.classList.add('is-playing'); // Hides the custom play button
                }
            }

            // Click events for both the custom button and the poster image
            playBtn.addEventListener('click', playVideo);
            video.addEventListener('click', playVideo);

            // Optional: Bring the custom play button back if the video ends
            video.addEventListener('ended', function() {
                video.removeAttribute('controls'); // Hide native controls
                videoContainer.classList.remove('is-playing'); // Show custom play button again
            });
        });
    </script>
</body>
</html>
